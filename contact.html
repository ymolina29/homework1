<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
  </head>
  <body>
    <header>
      <main><h1>Contact Us</h1></main>
    </header>
    <form action="formpost.html">
      <fieldset>
        <legend>Contact Information</legend>

        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" />
        <br />
        <label for="email">Email</label>
        <input type="email" id="email" name="email" />
        <br />
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" />
        <br />
      </fieldset>

      <fieldset>
        <legend>Other Information</legend>

        <label>Are you a student?</label>
        <br />
        <input
          type="radio"
          id="student_yes"
          name="student"
          value="yes"
          checked
        />
        <label for="student_yes">Yes</label>
        <br />
        <input type="radio" id="student_no" name="student" value="no" />
        <label for="student_no">No</label>
        <br />

        <label for="year">Student Year</label>
        <select id="year" name="year">
          <option value="">Select a year</option>
          <option value="freshman">Freshman</option>
          <option value="sophomore">Sophomore</option>
          <option value="junior">Junior</option>
          <option value="senior">Senior</option>
        </select>
        <br />

        <label for="enjoyment"
          >Major Enjoyment (1 = Not at all, 5 = Very much)</label
        >
        <br />
        <input type="range" id="enjoyment" name="enjoyment" min="1" max="5" />
        <br />

        <label for="comments">Comments</label>
        <br />
        <textarea id="comments" name="comments" rows="5" cols="40"></textarea>
      </fieldset>

      <br />
      <input type="submit" value="Submit Form" />
    </form>

    <br />
    <footer>© 2026 Yaneily Molina Moreno</footer>
  </body>
</html>
